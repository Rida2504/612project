name: main
# Built for Nebius VMs running CUDA 13 driver (580.x) on Blackwell GPUs
# (RTX PRO 6000, sm_120). PyTorch CUDA 12.8 wheels are the first to support
# Blackwell. We install torch via pip from the cu128 index, not conda.
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - numpy
  - pillow
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.7.1
      - torchvision==0.22.1
      - fastapi
      - uvicorn[standard]
      - pyyaml
      - requests
      - tqdm
      - plyfile
      - open-clip-torch
      - gsplat
      - diffusers==0.34.0
      - transformers==4.48.0
      - accelerate
      - safetensors
      - huggingface_hub
      - scipy
      - matplotlib
      - imageio[ffmpeg]
      - boto3>=1.34
      - botocore>=1.34
      - aiohttp
