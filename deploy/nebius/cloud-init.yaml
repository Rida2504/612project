#cloud-config
# First-boot setup for the TextWorld VR GPU VM.
# Installs docker + nvidia-container-toolkit, prepares persistent dirs.
# The image (ubuntu22.04-cuda12 family) already has the NVIDIA kernel driver.

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - __SSH_PUBKEY__

package_update: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - rsync
  - jq
  - htop
  - tmux
  - git

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "default-runtime": "nvidia",
        "runtimes": {
          "nvidia": {
            "path": "nvidia-container-runtime",
            "runtimeArgs": []
          }
        },
        "data-root": "/mnt/docker"
      }

runcmd:
  # Persistent dirs on the boot disk (survive container restart, NOT VM destroy).
  - mkdir -p /mnt/docker /mnt/models /mnt/scenes /mnt/work /mnt/src
  - chown -R ubuntu:ubuntu /mnt/models /mnt/scenes /mnt/work /mnt/src

  # Docker install (official repo).
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # NVIDIA container toolkit (so docker --gpus all works).
  - curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  - bash -c 'curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" > /etc/apt/sources.list.d/nvidia-container-toolkit.list'
  - apt-get update -y
  - apt-get install -y nvidia-container-toolkit
  - nvidia-ctk runtime configure --runtime=docker --set-as-default
  - systemctl restart docker
  - usermod -aG docker ubuntu

  # Friendly motd marker so SSH users know setup is done.
  - bash -c 'echo "TextWorld VR VM ready. Source ~/textworld-vr.env and run /mnt/src/textworld-vr/deploy/nebius/on_vm/build_and_run.sh" > /etc/motd'
  - touch /var/lib/cloud/textworld-vr-ready

final_message: "TextWorld VR VM bootstrap complete after $UPTIME seconds."
