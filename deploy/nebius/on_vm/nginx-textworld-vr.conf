# /etc/nginx/sites-available/textworld-vr
# Static viewer + scene file server. The FastAPI backend lives on :8000.
types { model/ply ply; application/octet-stream splat ksplat; }

server {
    listen 8080 default_server;
    server_name _;
    client_max_body_size 100M;

    location / { return 302 /viewer/; }

    location /viewer/ {
        alias /srv/viewer/;
        try_files $uri $uri/ /viewer/index.html;
        add_header Access-Control-Allow-Origin *;
    }

    # Local scene files (only used when SCENES_BACKEND=local). With
    # SCENES_BACKEND=s3 the API returns presigned URLs and nginx never
    # serves the .ply.
    location /splats/ {
        alias /scenes/;
        autoindex off;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /healthz { access_log off; return 200 'ok'; }
}
