worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    types { model/ply ply; application/octet-stream splat ksplat; }
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Nginx serves static assets on :8080. Ray Serve handles /generate /status /scenes on :8000.
    server {
        listen 8080 default_server;
        server_name _;

        # WebXR viewer
        location / { return 302 /viewer/; }
        location /viewer/ {
            alias /srv/viewer/;
            try_files $uri $uri/ /viewer/index.html;
            add_header Access-Control-Allow-Origin *;
        }

        # Scene files from local volume (when SCENES_BACKEND=local).
        # For SCENES_BACKEND=s3 the server returns presigned URLs so nginx never serves the ply.
        location /splats/ {
            alias /scenes/;
            autoindex off;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Health check for Knative / K8s liveness + readiness
        location = /healthz { access_log off; return 200 'ok'; }
    }
}
