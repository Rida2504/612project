<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextWorld VR — Gaussian Splat Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0c;
            color: #eaeaea;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        #header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
        #header h1 span { color: #6cf; }
        .btn {
            background: #2a2a2a; border: 1px solid #444; color: #eee;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn:hover { background: #333; }
        .btn.primary { background: #2563eb; border-color: #3b82f6; }
        .btn.primary:hover { background: #1e4ecc; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        select {
            background: #1a1a1a; border: 1px solid #444; color: #eee;
            padding: 5px 10px; border-radius: 6px; font-size: 13px;
            min-width: 200px;
        }
        #canvas-container { width: 100vw; height: 100vh; }
        #status {
            position: fixed; bottom: 12px; left: 12px;
            background: rgba(0,0,0,0.75); padding: 8px 12px;
            border-radius: 6px; font-size: 12px; line-height: 1.5;
            max-width: 360px;
        }
        #status .k { color: #888; }
        #status .v { color: #6cf; }
        #fps { position: fixed; top: 60px; right: 12px; background: rgba(0,0,0,0.75);
            padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: monospace; }
        #dropzone {
            position: fixed; inset: 0;
            background: rgba(37,99,235,0.25);
            border: 4px dashed #3b82f6;
            display: none; align-items: center; justify-content: center;
            font-size: 20px; pointer-events: none; z-index: 200;
        }
        #dropzone.show { display: flex; }
        #xr-note { font-size: 11px; color: #888; margin-left: 8px; }
    </style>
</head>
<body>
    <div id="header">
        <h1>TextWorld <span>VR</span></h1>
        <select id="scene-picker" title="Scene">
            <option value="">— load a scene —</option>
        </select>
        <button class="btn" id="reload">Reload</button>
        <button class="btn primary" id="enter-vr" disabled>Enter VR</button>
        <span id="xr-note">(requires Quest 3 / HTTPS)</span>
        <input type="file" id="file" accept=".ply,.splat,.ksplat" style="display:none">
        <button class="btn" id="open-file">Open .ply / .splat …</button>
    </div>

    <div id="canvas-container"></div>
    <div id="dropzone">Drop .ply / .splat / .ksplat to load</div>
    <div id="status">
        <div><span class="k">scene:</span> <span class="v" id="st-scene">none</span></div>
        <div><span class="k">splats:</span> <span class="v" id="st-count">—</span></div>
        <div><span class="k">webxr:</span> <span class="v" id="st-xr">checking…</span></div>
    </div>
    <div id="fps">— fps</div>

    <!-- Three.js + mkkellogg GaussianSplats3D via CDN ESM import maps -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.min.js"
        }
    }
    </script>

    <script type="module">
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const picker = document.getElementById('scene-picker');
        const vrBtn = document.getElementById('enter-vr');
        const reloadBtn = document.getElementById('reload');
        const openBtn = document.getElementById('open-file');
        const fileInput = document.getElementById('file');
        const dropzone = document.getElementById('dropzone');
        const stScene = document.getElementById('st-scene');
        const stCount = document.getElementById('st-count');
        const stXr = document.getElementById('st-xr');
        const fpsEl = document.getElementById('fps');

        let viewer = null;
        let currentSceneUrl = null;

        function initViewer() {
            if (viewer) {
                viewer.dispose && viewer.dispose();
                viewer = null;
            }
            viewer = new GaussianSplats3D.Viewer({
                rootElement: container,
                useBuiltInControls: true,
                // Place camera inside the panorama-depth sphere so the user looks OUTward
                // at the scene interior, not at the sphere-shell from outside.
                // Values in scene units; the back-projected shell sits at unit radius ~1.
                cameraUp: [0, 1, 0],
                initialCameraPosition: [0, 0, 0.001],
                initialCameraLookAt: [1, 0, 0],
                // WebXR
                webXRMode: GaussianSplats3D.WebXRMode.VR,
                // Perf on mobile/Quest
                sharedMemoryForWorkers: false,
                dynamicScene: false,
                gpuAcceleratedSort: true,
                halfPrecisionCovariancesOnGPU: true,
            });
            viewer.start();
            window.__tw_viewer = viewer;  // debug handle
        }

        let loadInFlight = null;

        async function loadScene(url, friendlyName) {
            // Serialize loads — don't start a new one while another is mid-flight.
            if (loadInFlight) { try { await loadInFlight; } catch (_) {} }
            loadInFlight = (async () => {
                if (!viewer) initViewer();
                // Remove any previously-added splat scenes so they don't accumulate.
                // addSplatScene is additive; mkkellogg 0.4.7 exposes removeSplatScenes.
                const sceneCount = viewer.getSceneCount?.() ?? 0;
                if (sceneCount > 0) {
                    const indices = [...Array(sceneCount).keys()];
                    await viewer.removeSplatScenes(indices, false);
                }
                stScene.textContent = friendlyName || url;
                stCount.textContent = 'loading…';
                await viewer.addSplatScene(url, {
                    splatAlphaRemovalThreshold: 5,
                    showLoadingUI: true,
                    position: [0, 0, 0],
                    rotation: [0, 0, 0, 1],
                    scale: [1, 1, 1],
                });
                currentSceneUrl = url;
                const total = viewer.splatMesh?.getSplatCount?.() ?? 'unknown';
                stCount.textContent = total;
            })();
            try { await loadInFlight; }
            catch (e) { console.error(e); stCount.textContent = 'error: ' + e.message; }
            finally { loadInFlight = null; }
        }

        // ─── Scene picker ──────────────────────────────────────────────
        async function populateScenes() {
            try {
                const res = await fetch('./scenes.json?t=' + Date.now(), { cache: 'no-store' });
                const scenes = await res.json();
                for (const s of scenes) {
                    const opt = document.createElement('option');
                    opt.value = s.url;
                    opt.textContent = s.name;
                    opt.dataset.name = s.name;
                    picker.appendChild(opt);
                }
                picker.addEventListener('change', () => {
                    if (picker.value) {
                        const name = picker.options[picker.selectedIndex].dataset.name;
                        loadScene(picker.value, name);
                    }
                });
            } catch (e) {
                console.warn('No scenes.json found or invalid:', e);
            }
        }

        // ─── WebXR availability ────────────────────────────────────────
        async function checkWebXR() {
            if (!('xr' in navigator)) {
                stXr.textContent = 'not supported (no navigator.xr)';
                return false;
            }
            try {
                const supported = await navigator.xr.isSessionSupported('immersive-vr');
                if (supported) {
                    stXr.textContent = 'immersive-vr ready';
                    vrBtn.disabled = false;
                    return true;
                } else {
                    stXr.textContent = 'immersive-vr not supported on this device';
                }
            } catch (e) {
                stXr.textContent = 'error: ' + e.message;
            }
            return false;
        }

        vrBtn.addEventListener('click', () => {
            if (viewer && viewer.renderer?.xr) {
                const session = navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
                });
                session.then(s => viewer.renderer.xr.setSession(s)).catch(console.error);
            }
        });

        // ─── Dev: drag-drop + file picker ──────────────────────────────
        document.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('show'); });
        document.addEventListener('dragleave', e => {
            if (e.target === document.documentElement) dropzone.classList.remove('show');
        });
        document.addEventListener('drop', async e => {
            e.preventDefault();
            dropzone.classList.remove('show');
            const f = e.dataTransfer.files[0];
            if (!f) return;
            const url = URL.createObjectURL(f);
            await loadScene(url, f.name);
        });

        openBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async () => {
            const f = fileInput.files[0];
            if (!f) return;
            const url = URL.createObjectURL(f);
            await loadScene(url, f.name);
        });

        reloadBtn.addEventListener('click', () => {
            if (currentSceneUrl) loadScene(currentSceneUrl, picker.options[picker.selectedIndex]?.dataset.name);
        });

        // ─── FPS counter ───────────────────────────────────────────────
        let lastTime = performance.now();
        let frames = 0;
        function tick(now) {
            frames++;
            if (now - lastTime >= 1000) {
                fpsEl.textContent = frames + ' fps';
                frames = 0;
                lastTime = now;
            }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // ─── Boot ──────────────────────────────────────────────────────
        initViewer();
        populateScenes();
        checkWebXR();
    </script>
</body>
</html>
